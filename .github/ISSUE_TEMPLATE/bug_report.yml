name: Bug Report
description: Report something that is broken or not working as expected.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below as completely as possible.

  - type: input
    id: version
    attributes:
      label: nuxt-unlayer version
      placeholder: e.g. 0.0.22
    validations:
      required: true

  - type: input
    id: nuxt-version
    attributes:
      label: Nuxt version
      placeholder: e.g. 3.15.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Please provide a minimal reproduction. You can fork the [live demo](https://nuxt-unlayer.behonbaker.com) or share a GitHub repo / StackBlitz link.
      placeholder: Link to reproduction or paste a minimal code snippet
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happens? Include any error messages or console output.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Browser, OS, or any other relevant information.
